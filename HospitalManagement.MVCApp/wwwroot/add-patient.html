<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Add Patient</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header>Add patient</header>
    <nav>
        <a href="index.html">Home</a>
    </nav>

    <form>
        <label for="name">Patient Name</label><br>
        <input type="text" id="name" required><br><br>

        <label for="age">Age</label><br>
        <input type="number" id="age" min="1" required><br><br>

        <label for="condition">Condition</label><br>
        <input type="text" id="condition" required><br><br>

        <label for="appointment">Appointment Date</label><br>
        <input type="date" id="appointment" required><br><br>

        <label for="doctorId">Doctor ID</label><br>
        <input type="number" id="doctorId" min="1" required><br><br>

        <button type="submit">Add Patient</button>
        <button type="reset">Reset</button>
    </form>

    <footer>
        Hospital Management.
    </footer>
</body>
</html>
